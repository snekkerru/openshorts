name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Tests only touch light modules (subtitles/hooks/translate/edit_builder),
      # so we install just what they import instead of the full requirements.txt
      # (faster-whisper/ultralytics/mediapipe are too heavy for CI).
      - name: Install test dependencies
        run: pip install pytest pillow httpx pydantic
      - name: Run tests
        run: pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
